<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ORCHID</title>
    <style>
        :root { --primary-color: #6b4e71; --secondary-color: #f7f3f9; --text-color: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); text-decoration: none; }
        .nav-links a { margin-left: 20px; text-decoration: none; color: var(--text-color); }
        .container { max-width: 1100px; margin: 50px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
        .contact-form { background: var(--secondary-color); padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: var(--primary-color); color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        footer { background: #333; color: white; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">ORCHID WELLNESS</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="services.html">Services</a>
            <a href="specialties.html">Specialties</a>
            <a href="faq.html">FAQ</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main class="container">
        <div>
            <h1>Contact Us</h1>
            <p>Ready to take the next step? We are currently accepting new clients.</p>
            <p><strong>Phone:</strong> 913-912-3430</p>
            <p><strong>Email:</strong> info@orchidwellness.com</p>
            <p><strong>Location:</strong> 123 Wellness Way, Suite 100, Kansas City.</p>
        </div>

        <div class="contact-form">
            <form action="#">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>

    <footer><p>&copy; 2026 Orchid Wellness and Advocacy.</p></footer>
</body>
</html>
